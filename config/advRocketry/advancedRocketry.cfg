        oreRupee:10
        oreBloodgem:10
        oreNetherite:10
        oreRosite:10
        oreLimonite:10
        oreRunium:10
        oreAscendedAmethyst:10
        oreAscendedJade:10
        oreAscendedSapphire:10
        oreAlchemicalMatter:10
        oreUranium:10
        oreThorium:10
     >

    # Treat laserDrillOres as a blacklist. Note: false + empty ore list will crash the game
