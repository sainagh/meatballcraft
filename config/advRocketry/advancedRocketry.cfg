    I:RutilePerChunk=6
    I:RutilePerClump=6
    I:TinPerChunk=10
    I:TinPerClump=6
    B:generateAluminum=false

    # Generate meteor craters on low-pressure planets.  Note: setting this option to false overrides 'generateCraters' in the planetDefs.xml
    B:generateCraters=false
